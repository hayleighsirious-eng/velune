<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Velune — My Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <link rel="icon" type="image/x-icon/jpeg" href="./assets/images/favicon-32x32.png">
  <script src="./supabase.js"></script>
  <style>
    :root {
      --navy:#0F1F3D; --navy-mid:#1A3260; --navy-light:#243F7A;
      --gold:#C9960C; --gold-light:#E8B422; --gold-pale:#FDF3D8;
      --white:#FFFFFF; --off-white:#F7F8FC;
      --gray-100:#EEF0F6; --gray-200:#D8DCE9; --gray-400:#8E9AB5;
      --gray-600:#5A6680; --gray-800:#2C3550;
      --success:#0C7A4A; --success-bg:#E6F7F0;
      --danger:#C0392B; --danger-bg:#FEF0EE;
      --warning:#B7770D; --warning-bg:#FEF9EC;
      --whatsapp:#25D366; --radius:10px; --radius-lg:16px;
      --shadow:0 2px 12px rgba(15,31,61,0.08);
      --shadow-lg:0 8px 32px rgba(15,31,61,0.14);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--off-white);min-height:100vh;-webkit-font-smoothing:antialiased}

    .student-topbar{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-mid) 100%);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 2px 16px rgba(15,31,61,0.2)}
    .topbar-brand{display:flex;align-items:center;gap:10px}
    .topbar-brand-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--gold),var(--gold-light));border-radius:8px;display:flex;align-items:center;justify-content:center;}
    .topbar-brand-name{font-family:'Playfair Display',serif;font-size:0.95rem;color:var(--white);font-weight:700}
    .btn-logout-top{padding:7px 16px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.8);border-radius:8px;font-size:0.8rem;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:6px}
    .btn-logout-top:hover{background:rgba(255,255,255,0.18);color:var(--white)}

    .student-page{max-width:680px;margin:0 auto;padding:28px 20px 60px}

    .profile-card{background:var(--white);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow-lg);margin-bottom:20px}
    .profile-banner{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-mid) 100%);height:90px;position:relative}
    .profile-body{padding:0 24px 24px}
    .profile-avatar-wrap{display:flex;align-items:flex-end;justify-content:space-between;margin-top:-36px;margin-bottom:14px}
    .profile-avatar{width:72px;height:72px;border-radius:50%;background:var(--gray-100);border:4px solid var(--white);box-shadow:0 4px 14px rgba(0,0,0,0.15);display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:800;color:var(--navy)}
    .profile-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
    .profile-status-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:0.75rem;font-weight:700;letter-spacing:0.05em;text-transform:uppercase}
    .profile-status-badge svg{width:13px;height:13px;flex-shrink:0}
    .profile-status-badge.paid{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:var(--navy);box-shadow:0 3px 10px rgba(201,150,12,0.3)}
    .profile-status-badge.partial{background:var(--warning-bg);color:var(--warning);border:1px solid rgba(183,119,13,0.25)}
    .profile-name{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--navy);font-weight:700;margin-bottom:3px}
    .profile-class{font-size:0.85rem;color:var(--gray-400);margin-bottom:4px}
    .profile-meta{font-size:0.78rem;color:var(--gray-600)}
    .profile-meta strong{color:var(--navy)}

    .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
    .mini-stat{background:var(--white);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow)}
    .mini-stat-label{font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--gray-400);margin-bottom:6px}
    .mini-stat-value{font-size:1.05rem;font-weight:800;color:var(--navy)}
    .mini-stat-value.green{color:var(--success)}
    .mini-stat-value.red{color:var(--danger)}

    .serial-card{background:var(--white);border-radius:var(--radius);padding:16px 20px;margin-bottom:20px;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:space-between;border-left:4px solid var(--gold)}
    .serial-card.pending{border-left-color:var(--warning)}
    .serial-card.temp{border-left-color:var(--navy-light)}
    .serial-card-label{font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--gray-400);margin-bottom:5px}
    .serial-card-number{font-size:1.5rem;font-weight:800;color:var(--navy);font-family:monospace;letter-spacing:0.05em}
    .serial-card-sub{font-size:0.75rem;color:var(--gray-400);margin-top:3px}
    .serial-card-icon{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center}
    .serial-card-icon.gold{background:var(--gold-pale)}
    .serial-card-icon.gold svg{stroke:var(--gold)}
    .serial-card-icon.navy{background:rgba(26,50,96,0.08)}
    .serial-card-icon.navy svg{stroke:var(--navy-light)}
    .serial-card-icon.warning{background:var(--warning-bg)}
    .serial-card-icon.warning svg{stroke:var(--warning)}
    .serial-card-icon svg{width:22px;height:22px}

    .timer-card{background:var(--white);border-radius:var(--radius-lg);padding:20px 24px;margin-bottom:20px;box-shadow:var(--shadow)}
    .timer-card.owing{border:2px solid var(--warning-bg)}
    .timer-title{font-size:0.82rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--gray-400);margin-bottom:14px;display:flex;align-items:center;gap:7px}
    .timer-title svg{width:14px;height:14px;flex-shrink:0}
    .timer-days-big{font-size:2.6rem;font-weight:900;color:var(--navy);line-height:1;margin-bottom:4px;font-family:'Playfair Display',serif}
    .timer-days-label{font-size:0.8rem;color:var(--gray-400);margin-bottom:14px}
    .timer-bar-wrap{height:8px;background:var(--gray-100);border-radius:100px;overflow:hidden;margin-bottom:10px}
    .timer-bar{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--gold),var(--gold-light));transition:width 0.5s ease}
    .timer-bar.warn{background:linear-gradient(90deg,var(--warning),#e8a317)}
    .timer-bar.danger{background:linear-gradient(90deg,var(--danger),#e74c3c)}
    .timer-dates{display:flex;justify-content:space-between;font-size:0.75rem;color:var(--gray-400)}
    .timer-alert{margin-top:14px;padding:10px 14px;border-radius:8px;font-size:0.82rem;font-weight:600;display:flex;align-items:center;gap:8px}
    .timer-alert svg{width:15px;height:15px;flex-shrink:0}
    .timer-alert.warn{background:var(--warning-bg);color:var(--warning)}
    .timer-alert.danger{background:var(--danger-bg);color:var(--danger)}

    .pause-banner{background:rgba(26,50,96,0.06);border:1px solid rgba(26,50,96,0.15);border-radius:var(--radius);padding:14px 18px;margin-bottom:20px;display:flex;gap:12px;align-items:flex-start}
    .pause-banner svg{stroke:var(--navy-light);flex-shrink:0;margin-top:2px}
    .pause-banner-text strong{display:block;font-weight:700;color:var(--navy);font-size:0.88rem;margin-bottom:3px}
    .pause-banner-text span{font-size:0.8rem;color:var(--gray-600)}

    .outstanding-banner{background:var(--danger-bg);border:1px solid rgba(192,57,43,0.2);border-radius:var(--radius);padding:14px 18px;margin-bottom:20px;display:flex;gap:12px;align-items:flex-start}
    .outstanding-banner svg{stroke:var(--danger);flex-shrink:0;margin-top:2px;width:20px;height:20px}
    .outstanding-banner-title{font-weight:700;color:var(--danger);font-size:0.9rem;margin-bottom:3px}
    .outstanding-banner-sub{font-size:0.8rem;color:var(--gray-600);line-height:1.5}

    .bank-card{background:var(--white);border-radius:var(--radius-lg);padding:20px 24px;margin-bottom:16px;box-shadow:var(--shadow)}
    .bank-card-header{display:flex;gap:12px;align-items:center;margin-bottom:16px}
    .bank-card-icon{width:40px;height:40px;background:rgba(201,150,12,0.1);border-radius:10px;display:flex;align-items:center;justify-content:center}
    .bank-card-icon svg{width:20px;height:20px;stroke:var(--gold)}
    .bank-card-title{font-size:0.9rem;font-weight:700;color:var(--navy)}
    .bank-card-sub{font-size:0.75rem;color:var(--gray-400)}
    .bank-details-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
    .bank-detail-item{background:var(--off-white);border-radius:8px;padding:10px 14px}
    .bank-detail-label{font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--gray-400);margin-bottom:4px}
    .bank-detail-value{font-size:0.88rem;font-weight:700;color:var(--navy)}
    .bank-account-number{background:var(--navy);border-radius:10px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .bank-account-number-label{font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:rgba(255,255,255,0.5);margin-bottom:4px}
    .bank-account-number-val{font-size:1.4rem;font-weight:800;color:var(--white);font-family:monospace;letter-spacing:0.1em}
    .copy-btn{padding:8px 16px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);color:rgba(255,255,255,0.85);border-radius:8px;font-size:0.8rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:'DM Sans',sans-serif;transition:all 0.2s;flex-shrink:0}
    .copy-btn:hover,.copy-btn.copied{background:rgba(255,255,255,0.25)}
    .bank-amount-due{display:flex;justify-content:space-between;align-items:center;padding:10px 0}
    .bank-amount-due-label{font-size:0.8rem;color:var(--gray-400);font-weight:600}
    .bank-amount-due-val{font-size:1.2rem;font-weight:800;color:var(--danger)}

    .whatsapp-section{background:var(--white);border-radius:var(--radius-lg);padding:20px 24px;margin-bottom:20px;box-shadow:var(--shadow);border-top:3px solid var(--whatsapp)}
    .whatsapp-section-title{display:flex;align-items:center;gap:8px;font-size:0.95rem;font-weight:700;color:var(--navy);margin-bottom:8px}
    .whatsapp-section-sub{font-size:0.82rem;color:var(--gray-600);margin-bottom:16px;line-height:1.5}
    .whatsapp-steps{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
    .whatsapp-step{display:flex;gap:10px;align-items:flex-start;font-size:0.82rem;color:var(--gray-600)}
    .whatsapp-step-num{width:22px;height:22px;border-radius:50%;background:rgba(37,211,102,0.15);color:var(--whatsapp);font-size:0.75rem;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
    .btn-whatsapp{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:14px;background:linear-gradient(135deg,var(--whatsapp),#20bc5a);color:var(--white);border:none;border-radius:var(--radius);font-size:0.92rem;font-weight:700;cursor:pointer;text-decoration:none;font-family:'DM Sans',sans-serif;transition:all 0.2s;box-shadow:0 4px 14px rgba(37,211,102,0.3)}
    .btn-whatsapp:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(37,211,102,0.4)}

    .info-card{background:var(--white);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow);margin-bottom:20px}
    .info-card-header{display:flex;align-items:center;gap:8px;padding:14px 20px;border-bottom:1px solid var(--gray-100);font-size:0.82rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--gray-600)}
    .info-card-header svg{width:16px;height:16px;stroke:var(--gray-400)}
    .info-row{display:flex;justify-content:space-between;align-items:center;padding:10px 20px;border-bottom:1px solid var(--gray-100)}
    .info-row:last-child{border-bottom:none}
    .info-key{font-size:0.8rem;color:var(--gray-400);font-weight:500}
    .info-val{font-size:0.85rem;font-weight:600;color:var(--navy);text-align:right;max-width:60%}

    .payment-item{display:flex;align-items:center;gap:14px;padding:12px 20px;border-bottom:1px solid var(--gray-100)}
    .payment-item:last-child{border-bottom:none}
    .payment-item-icon{width:36px;height:36px;border-radius:50%;background:var(--success-bg);display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .payment-item-icon svg{width:16px;height:16px;stroke:var(--success)}
    .payment-item-info{flex:1}
    .payment-item-date{font-size:0.82rem;font-weight:600;color:var(--navy)}
    .payment-item-method{font-size:0.75rem;color:var(--gray-400)}
    .payment-item-right{text-align:right}
    .payment-item-amount{font-size:0.92rem;font-weight:800;color:var(--success)}
    .payment-item-label{font-size:0.7rem;color:var(--gray-400)}
    .empty-payments{display:flex;flex-direction:column;align-items:center;gap:10px;padding:30px;color:var(--gray-400);font-size:0.85rem}
    .empty-payments svg{width:40px;height:40px;stroke:var(--gray-200)}

    .cycle-ended-card{background:var(--danger-bg);border:1px solid rgba(192,57,43,0.2);border-radius:var(--radius-lg);padding:20px 24px;margin-bottom:20px}
    .cycle-ended-card-title{display:flex;align-items:center;gap:8px;font-weight:700;color:var(--danger);margin-bottom:6px}
    .cycle-ended-card-title svg{width:16px;height:16px;stroke:var(--danger);flex-shrink:0}
    .no-cycle-card{background:var(--warning-bg);border:1px solid rgba(183,119,13,0.2);border-radius:var(--radius-lg);padding:20px 24px;margin-bottom:20px}
    .no-cycle-card-title{display:flex;align-items:center;gap:8px;font-weight:700;color:var(--warning);margin-bottom:6px}
    .no-cycle-card-title svg{width:16px;height:16px;stroke:var(--warning);flex-shrink:0}

    .welcome-banner{background:linear-gradient(135deg,rgba(201,150,12,0.08),rgba(201,150,12,0.04));border:1px solid rgba(201,150,12,0.2);border-radius:var(--radius);padding:12px 18px;margin-bottom:16px;display:flex;align-items:center;gap:12px;font-size:0.85rem}
    .welcome-banner-icon{width:32px;height:32px;background:rgba(201,150,12,0.12);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .welcome-banner-icon svg{width:16px;height:16px;stroke:var(--gold)}
    .welcome-banner strong{color:var(--navy)}
    .welcome-banner span{color:var(--gray-600)}

    .toast-container{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
    .toast{padding:12px 18px;border-radius:10px;font-size:0.85rem;font-weight:600;display:flex;align-items:center;gap:8px;box-shadow:0 4px 16px rgba(0,0,0,0.15);color:var(--white)}
    .toast.success{background:var(--success)}
    .toast.error{background:var(--danger)}
    .toast.info{background:var(--navy)}

    .error-card{background:var(--danger-bg);border:1px solid rgba(192,57,43,0.25);border-radius:var(--radius-lg);padding:24px;text-align:center;margin-top:40px}
    .error-card h3{color:var(--danger);margin-bottom:8px}
    .error-card p{color:var(--gray-600);font-size:0.85rem}

    /* Loading spinner replaces ⏳ */
    .loading-spinner{display:flex;flex-direction:column;align-items:center;gap:14px;padding:60px 0;color:var(--gray-400)}
    .spinner-ring{width:40px;height:40px;border:3px solid var(--gray-200);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>

<div class="student-topbar">
  <div class="topbar-brand">
    <div class="topbar-brand-icon">
      <!-- Open book -->
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--navy)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
      </svg>
    </div>
    <div>
      <div class="topbar-brand-name" id="centreTitleDisplay">Velune</div>
    </div>
  </div>
  <button class="btn-logout-top" onclick="handleLogout()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    Sign Out
  </button>
  <a href="./secure-viewer.html" class="nav-item" onclick="">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
    <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
  </svg>
  Materials
</a>
</div>

<div class="student-page" id="student-page">
  <div class="loading-spinner">
    <div class="spinner-ring"></div>
    Loading your dashboard...
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script>
  // Guard: redirect if no student session
  const studentId = localStorage.getItem('zt_student_id');
  const ownerId   = localStorage.getItem('zt_owner_id');
  if (!studentId) { window.location.href = './index.html'; }

  let ownerProfile = null;

  // ── SVG helpers (reusable inline SVG strings for JS-generated HTML) ──────────
  const SVG = {
    // star — used in "Fully Paid" badge
    star: `<svg viewBox="0 0 24 24" fill="currentColor" stroke="none" xmlns="http://www.w3.org/2000/svg"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
    // shield — used in "Temp VIP" badge
    shield: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>`,
    // clock — used in "Awaiting Payment" badge and countdown labels
    clock: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
    // check-circle — used in "Access Cycle" timer title
    checkCircle: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`,
    // triangle warning — used in timer alerts
    warning: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
    // bell alert — used in critical timer alert
    alert: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>`,
    // ban circle — used in "Cycle Ended"
    stop: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>`,
    // graduation cap — used in welcome banner
    gradCap: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>`,
  };

  function handleLogout() {
    localStorage.removeItem('zt_role');
    localStorage.removeItem('zt_student_id');
    localStorage.removeItem('zt_owner_id');
    window.location.href = './index.html';
  }

  function copyAccountNumber(num) {
    if (!num || num === '—') return;
    navigator.clipboard.writeText(num).then(() => {
      showToast('Account number copied!', 'success');
      const btn = document.getElementById('copy-btn');
      if (btn) {
        btn.classList.add('copied');
        btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Copied!`;
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy`;
        }, 2500);
      }
    }).catch(() => showToast('Could not copy — please copy manually.', 'error'));
  }

  async function loadStudentDashboard() {
    try {
      const [studentRes, profileRes] = await Promise.all([
        _supabase.from('students').select('*').eq('id', studentId).single(),
        ownerId
          ? _supabase.from('profiles').select('*').eq('id', ownerId).single()
          : Promise.resolve({ data: null, error: null })
      ]);

      if (studentRes.error || !studentRes.data) {
        showError('Student record not found. Please contact your admin or sign in again.');
        return;
      }

      const student = studentRes.data;
      ownerProfile  = profileRes.data || {};

      // Set centre name in topbar
      if (ownerProfile.centre_name) {
        document.getElementById('centreTitleDisplay').textContent = ownerProfile.centre_name;
        document.title = ownerProfile.centre_name + ' — My Dashboard';
      }

      // Auto-expire VIP cycle if overdue (recurring mode)
      if (ownerProfile.mode === 'recurring' && student.vip_active && student.cycle_start) {
        const cycle = calcCycle(student);
        if (cycle.expired) {
          await _supabase.from('students').update({
            vip_active: false, temp_vip: false, serial: null, is_vip: false
          }).eq('id', studentId);
          student.vip_active = false;
          student.temp_vip   = false;
          student.serial     = null;
          student.is_vip     = false;
        }
      }

      // Load payments
      const { data: payments } = await _supabase
        .from('payments').select('*').eq('student_id', studentId)
        .order('payment_date', { ascending: false });

      renderDashboard(student, payments || []);
      showWelcomeBanner(student.name);

    } catch (err) {
      console.error('Dashboard load error:', err);
      showError('Something went wrong loading your dashboard. Please try again.');
    }
  }

  function showError(msg) {
    document.getElementById('student-page').innerHTML = `
      <div class="error-card">
        <h3>Unable to load dashboard</h3>
        <p>${msg}</p>
        <button onclick="handleLogout()" style="margin-top:16px;padding:10px 24px;background:var(--navy);color:white;border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:600">Back to Login</button>
      </div>`;
  }

  function renderDashboard(s, payments) {
    const page      = document.getElementById('student-page');
    const nameStr   = s.name || 'Student';
    const initials  = nameStr.split(' ').filter(Boolean).map(n => n[0]).join('').toUpperCase().substring(0, 2) || '??';
    const photoHtml = s.photo_url
      ? `<img src="${escHtml(s.photo_url)}" alt="${escHtml(nameStr)}">`
      : initials;
    const isRecurring = ownerProfile.mode === 'recurring';
    const isFullyPaid = s.status === 'paid' || (s.balance !== null && s.balance <= 0);
    const isTempVip   = s.is_vip && s.vip_type === 'temp';
    const isOwing     = (s.balance || 0) > 0;

    // Status badge — SVG icons replace emojis
    let badge;
    if (isFullyPaid) {
      badge = `<span class="profile-status-badge paid">${SVG.star} Fully Paid</span>`;
    } else if (isTempVip) {
      badge = `<span class="profile-status-badge" style="background:rgba(26,50,96,0.1);color:var(--navy-light)">${SVG.shield} Temp VIP</span>`;
    } else {
      badge = `<span class="profile-status-badge partial">${SVG.clock} Awaiting Payment</span>`;
    }

    // Login identifier
    const loginMeta = s.login_id
      ? `Login ID: <strong>${escHtml(s.login_id)}</strong>`
      : s.student_pin ? `PIN: <strong>${escHtml(s.student_pin)}</strong>` : '';

    // Serial card (icons already use SVG in original — unchanged)
    let serialHtml = '';
    if (isFullyPaid && s.serial) {
      serialHtml = `<div class="serial-card">
        <div>
          <div class="serial-card-label">Clearance Serial Number</div>
          <div class="serial-card-number">#${escHtml(s.serial)}</div>
          <div class="serial-card-sub">Permanent · Issued on full payment</div>
        </div>
        <div class="serial-card-icon gold">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        </div>
      </div>`;
    } else if (isTempVip && s.serial) {
      serialHtml = `<div class="serial-card temp">
        <div>
          <div class="serial-card-label">Temporary Access Serial</div>
          <div class="serial-card-number">${escHtml(s.serial)}</div>
          <div class="serial-card-sub">Temporary · Granted by admin</div>
        </div>
        <div class="serial-card-icon navy">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </div>
      </div>`;
    } else {
      serialHtml = `<div class="serial-card pending">
        <div>
          <div class="serial-card-label">Clearance Serial Number</div>
          <div class="serial-card-number" style="font-size:1rem;color:var(--warning)">Not Yet Issued</div>

    // Timer (recurring only)

        const cycle    = calcCycle(s);
        const pctClass = cycle.pct > 40 ? '' : cycle.pct > 15 ? 'warn' : 'danger';
        if (!cycle.expired) {
          // checkCircle SVG for "Access Cycle", clock SVG for "Payment Countdown"
          const titleIcon = s.vip_active ? SVG.checkCircle : SVG.clock;
          const titleText = s.vip_active ? 'Access Cycle' : 'Payment Countdown';

          if (cycle.daysLeft <= 5 && cycle.daysLeft > 0) {
            alertMsg = s.vip_active
              ? `<div class="timer-alert warn">${SVG.warning} Your access expires in <strong>${cycle.daysLeft} day${cycle.daysLeft !== 1 ? 's' : ''}</strong>. Please renew soon.</div>`

          }
          timerHtml = `<div class="timer-card ${!s.vip_active ? 'owing' : ''}">
            <div class="timer-title">${titleIcon} ${titleText} — Month ${s.month_number || 1}</div>
            <div class="timer-days-big">${cycle.daysLeft}</div>
            <div class="timer-days-label">days remaining${!s.vip_active ? ' to complete payment' : ''}</div>
            <div class="timer-bar-wrap"><div class="timer-bar ${pctClass}" style="width:${cycle.pct}%"></div></div>
            <div class="timer-dates"><span>Started ${fmtDate(s.cycle_start)}</span><span>Due ${fmtDate(cycle.due)}</span></div>
            ${alertMsg}
          </div>`;
        } else {
          const nextMonth = (s.month_number || 1) + 1;
          timerHtml = `<div class="cycle-ended-card">
            <div class="cycle-ended-card-title">${SVG.stop} 30-Day Cycle Ended</div>

        timerHtml = `<div class="no-cycle-card">
          <div class="no-cycle-card-title">${SVG.clock} No Active Cycle</div>

    // Bank / payment section

      const balance  = s.balance || 0;

      const waMsg = encodeURIComponent(
        `Hello ${ownerProfile.centre_name || 'Admin'}\n\nMy name is *${nameStr}*` +

      const waLink = whatsapp ? `https://wa.me/${whatsapp}?text=${waMsg}` : '#';

      bankHtml = `
        <div class="outstanding-banner">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <div>
            <div class="outstanding-banner-title">Outstanding: &#x20a6;${balance.toLocaleString()}</div>
            <div class="outstanding-banner-sub">Make payment to the account below, then send your receipt via WhatsApp.</div>

        </div>

        <div class="bank-card">
          <div class="bank-card-header">
            <div class="bank-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg></div>
            <div><div class="bank-card-title">Payment Account Details</div><div class="bank-card-sub">Transfer your balance to this account</div></div>
          </div>
          <div class="bank-details-grid">
            <div class="bank-detail-item"><div class="bank-detail-label">Account Name</div><div class="bank-detail-value">${escHtml(accName)}</div></div>
            <div class="bank-detail-item"><div class="bank-detail-label">Bank</div><div class="bank-detail-value">${escHtml(bankName)}</div></div>
          </div>
          <div class="bank-account-number">
            <div>
              <div class="bank-account-number-label">Account Number</div>
              <div class="bank-account-number-val">${escHtml(accNum)}</div>
            </div>
            <button class="copy-btn" id="copy-btn" onclick="copyAccountNumber('${escAttr(accNum)}')">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
              Copy

          </div>
          <div class="bank-amount-due">
            <div class="bank-amount-due-label">Amount You Owe</div>
            <div class="bank-amount-due-val">&#x20a6;${balance.toLocaleString()}</div>
          </div>
        </div>

        ${whatsapp ? `
        <div class="whatsapp-section">
          <div class="whatsapp-section-title">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="#25D366"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            Send Receipt via WhatsApp
          </div>
          <div class="whatsapp-section-sub">After making your transfer, tap the button below to notify your admin with a pre-filled message.</div>
          <div class="whatsapp-steps">
            <div class="whatsapp-step"><div class="whatsapp-step-num">1</div><div>Make your bank transfer using the account details above</div></div>
            <div class="whatsapp-step"><div class="whatsapp-step-num">2</div><div>Screenshot or save your payment receipt</div></div>
            <div class="whatsapp-step"><div class="whatsapp-step-num">3</div><div>Tap below — your message is pre-filled. Attach the receipt and send.</div></div>
          </div>
          <a class="btn-whatsapp" href="${waLink}" target="_blank" rel="noopener noreferrer">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            Notify Admin on WhatsApp
          </a>
        </div>` : ''}`;
    }

    // Payment history
    let histHtml = '';
    if (!payments.length) {
      histHtml = `<div class="empty-payments">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
        No payment records yet.
      </div>`;
    } else {
      let total = 0;
      histHtml = payments.map(p => {
        total += p.amount || 0;
        const rawDate = p.payment_date || p.created_at;
        const dateStr = rawDate
          ? new Date(rawDate).toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short', year:'numeric' })
          : '—';
        return `<div class="payment-item">
          <div class="payment-item-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg></div>
          <div class="payment-item-info">
            <div class="payment-item-date">${dateStr}</div>
            <div class="payment-item-method">${escHtml(p.method || 'Payment')}</div>
          </div>
          <div class="payment-item-right">
            <div class="payment-item-amount">+&#x20a6;${(p.amount || 0).toLocaleString()}</div>
            <div class="payment-item-label">Recorded</div>
          </div>
        </div>`;
      }).join('');
      histHtml += `<div style="padding:12px 20px;background:var(--off-white);display:flex;justify-content:space-between;font-size:0.8rem;border-top:1px solid var(--gray-100)">

    page.innerHTML = `
      ${timerHtml}
      ${bankHtml}

      <div class="profile-card">
        <div class="profile-banner"></div>
        <div class="profile-body">
          <div class="profile-avatar-wrap">
            <div class="profile-avatar">${photoHtml}</div>
            ${badge}
          </div>
          <div class="profile-name">${escHtml(nameStr)}</div>
          <div class="profile-class">${escHtml(s.class || '—')}</div>

        <div class="info-card-header">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          Payment History
        </div>
        ${histHtml}
      </div>
    `;
  }

  function fmt(n) {
    const num = parseFloat(n) || 0;
    if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
    if (num >= 1000)    return (num / 1000).toFixed(0) + 'K';
    return num.toLocaleString();
  }

  function escHtml(str) {
    if (str === null || str === undefined) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function escAttr(str) {
    if (str === null || str === undefined) return '';
    return String(str).replace(/'/g, "\\'");
  }

  function showWelcomeBanner(name) {
    const key = 'velune_student_welcomed';
    if (sessionStorage.getItem(key)) return;
    sessionStorage.setItem(key, '1');
    const hour     = new Date().getHours();
    const greeting = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
    const firstName = (name || 'Student').split(' ')[0];
    const banner   = document.createElement('div');
    banner.className = 'welcome-banner';
    // graduation cap SVG in a styled icon wrapper
    banner.innerHTML = `
      <div class="welcome-banner-icon">${SVG.gradCap}</div>
      <div><strong>${greeting}, ${escHtml(firstName)}!</strong> <span>Welcome back. Check your payment status below.</span></div>`;
    const page = document.getElementById('student-page');
    if (page) page.insertBefore(banner, page.firstChild);
    setTimeout(() => {
      if (banner.parentNode) {
        banner.style.transition = 'opacity 0.4s ease';
        banner.style.opacity    = '0';
        setTimeout(() => banner.remove(), 420);
      }
    }, 6000);
  }

  function showToast(msg, type = 'info') {
    const container = document.getElementById('toast-container');
    const toast     = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.textContent = msg;
    container.appendChild(toast);
    setTimeout(() => {
      toast.style.opacity    = '0';
      toast.style.transition = 'opacity 0.3s';
      setTimeout(() => toast.remove(), 300);
    }, 3000);
  }

  loadStudentDashboard();
</script>
